name: IPA Build

on:
  push:
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for sync

      - name: Checkout MoneroKit.Swift
        uses: actions/checkout@v4
        with:
          repository: bwgh0/MoneroKit.Swift
          path: MoneroKit.Swift

      - name: Fix MoneroKit path for CI
        run: |
          # Update all local package reference paths in pbxproj (with and without quotes)
          sed -i '' 's|\.\./MoneroKit\.Swift|MoneroKit.Swift|g' MoneroOne.xcodeproj/project.pbxproj

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MoneroOne.xcodeproj \
            -scheme MoneroOne

      - name: Build for iOS
        run: |
          xcodebuild -project MoneroOne.xcodeproj \
            -scheme MoneroOne \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create unsigned IPA
        run: |
          mkdir -p build/output
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv MoneroOne.app Payload/
          zip -r ../../../output/MoneroOne-unsigned.ipa Payload
          cd ../../../output
          unzip -l MoneroOne-unsigned.ipa | head -20

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/output/MoneroOne-unsigned.ipa

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore
